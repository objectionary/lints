<h1 id="wrong-test-order">Wrong test order</h1>
<p>Unit tests must be located after live objects:</p>
<p>Incorrect:</p>
<pre class="eo"><code>[] &gt; foo
  [] +&gt; runs-something
  [] &gt; bar</code></pre>
<p>Correct:</p>
<pre class="eo"><code>[] &gt; foo
  [] &gt; bar
  [] +&gt; runs-something</code></pre>
