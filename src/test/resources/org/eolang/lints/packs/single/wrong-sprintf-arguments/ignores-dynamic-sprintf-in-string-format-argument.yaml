---
sheets:
  - /org/eolang/lints/misc/wrong-sprintf-arguments.xsl
asserts:
  - /defects[count(defect[@severity='warning'])=0]
input: |
  # Log.
  [fmt args kid] > log
    seq > @
      *
        stdout
          magenta
            txt.sprintf
              "\033[90m%s\033[0m\n"
              *
                txt.sprintf
                  fmt
                  * args
        kid
