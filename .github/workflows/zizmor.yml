---
# yamllint disable rule:line-length
name: zizmor
'on':
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
permissions: {}
jobs:
  zizmor:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@v0.5.6
        continue-on-error: true
        with:
          advanced-security: false
